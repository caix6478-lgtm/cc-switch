<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>麻将连连看</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    body {
      background: #1a5c2a;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- Menu Screen ---------- */
    #menu-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 24px;
      padding: 20px;
    }

    #menu-screen h1 {
      color: #ffd700;
      font-size: 28px;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    #btn-start {
      padding: 14px 48px;
      font-size: 20px;
      border: none;
      border-radius: 8px;
      background: #e6b422;
      color: #1a5c2a;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    #btn-start:active {
      transform: scale(0.96);
    }

    #level-select {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ---------- Game Screen ---------- */
    #game-screen {
      display: none;
      flex-direction: column;
      height: 100%;
      padding: 8px;
    }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 8px;
      color: #ffd700;
      font-size: 16px;
      font-weight: bold;
    }

    #status-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 4px 8px;
      color: #fff;
      font-size: 14px;
    }

    #board-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    #board {
      position: relative;
    }

    #btn-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 4px;
    }

    #btn-bar button {
      padding: 8px 12px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #e6b422;
      color: #1a5c2a;
      font-weight: bold;
      cursor: pointer;
    }

    #btn-bar button:active {
      transform: scale(0.94);
    }

    #btn-bar button .count {
      font-size: 11px;
      color: #333;
    }

    /* ---------- Result Screen ---------- */
    #result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      padding: 20px;
    }

    #result-screen .result-title {
      color: #ffd700;
      font-size: 26px;
      font-weight: bold;
      text-align: center;
    }

    #result-screen .result-score {
      color: #fff;
      font-size: 20px;
    }

    #result-screen .result-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #result-screen .result-buttons button {
      padding: 12px 28px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #e6b422;
      color: #1a5c2a;
      font-weight: bold;
      cursor: pointer;
    }

    #result-screen .result-buttons button:active {
      transform: scale(0.96);
    }

    /* ---------- Pause Overlay ---------- */
    #pause-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #pause-overlay .pause-message {
      color: #ffd700;
      font-size: 28px;
      font-weight: bold;
    }

    #pause-overlay #btn-resume {
      padding: 14px 48px;
      font-size: 20px;
      border: none;
      border-radius: 8px;
      background: #e6b422;
      color: #1a5c2a;
      font-weight: bold;
      cursor: pointer;
    }

    #pause-overlay #btn-resume:active {
      transform: scale(0.96);
    }

    /* ========== Tile Styles ========== */

    .tile {
      aspect-ratio: 1;
      background: #f5f0e8;
      border: 2px solid #c8b896;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 1px 2px 3px rgba(0,0,0,0.3);
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-size: clamp(10px, 3.5vw, 18px);
      font-weight: bold;
      color: #333;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .tile:active {
      transform: scale(0.93);
    }

    .tile.selected {
      box-shadow: 0 0 0 3px #ff6600, 0 0 8px rgba(255,102,0,0.5);
      transform: scale(1.05);
    }

    .tile.hint-glow {
      animation: hintPulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes hintPulse {
      from { box-shadow: 0 0 0 3px #ffcc00, 0 0 8px rgba(255,204,0,0.5); }
      to   { box-shadow: 0 0 0 6px #ffcc00, 0 0 12px rgba(255,204,0,0.8); }
    }

    .tile.removing {
      animation: tileRemove 0.3s ease-out forwards;
    }

    @keyframes tileRemove {
      to { transform: scale(0); opacity: 0; }
    }

    .tile.empty {
      visibility: hidden;
    }

    /* Dot patterns (筒) */
    .tile .dot-container {
      display: grid;
      gap: 1px;
      width: 75%;
      height: 75%;
    }

    .tile.dots-1 .dot-container { grid-template: "a" 1fr / 1fr; }
    .tile.dots-1 .dot { place-self: center; }

    .tile.dots-2 .dot-container { grid-template: "a ." 1fr ". b" 1fr / 1fr 1fr; }

    .tile.dots-3 .dot-container { grid-template: "a ." 1fr "b c" 1fr / 1fr 1fr; }
    .tile.dots-3 .dot:nth-child(1) { grid-area: a; }
    .tile.dots-3 .dot:nth-child(2) { grid-area: b; }
    .tile.dots-3 .dot:nth-child(3) { grid-area: c; }

    .tile.dots-4 .dot-container { grid-template: "a b" 1fr "c d" 1fr / 1fr 1fr; }

    .tile.dots-5 .dot-container { grid-template: "a . b" 1fr ". c ." 1fr "d . e" 1fr / 1fr 1fr 1fr; }

    .tile.dots-6 .dot-container { grid-template: "a b" 1fr "c d" 1fr "e f" 1fr / 1fr 1fr; }

    .tile.dots-7 .dot-container { grid-template: "a . b" 1fr "c d e" 1fr "f . g" 1fr / 1fr 1fr 1fr; }

    .tile.dots-8 .dot-container { grid-template: "a b c" 1fr "d . e" 1fr "f g h" 1fr / 1fr 1fr 1fr; }

    .tile.dots-9 .dot-container { grid-template: "a b c" 1fr "d e f" 1fr "g h i" 1fr / 1fr 1fr 1fr; }

    .dot {
      width: 28%;
      aspect-ratio: 1;
      background: #333;
      border-radius: 50%;
      place-self: center;
    }

    /* Line patterns (条) */
    .tile .line-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2px;
      width: 70%;
      height: 60%;
    }

    .bamboo-line {
      width: 3px;
      height: 100%;
      background: #2d8a4e;
      border-radius: 2px;
    }

    /* Chinese character tiles (万/风/箭) */
    .tile.char-tile {
      font-size: clamp(14px, 4vw, 22px);
      color: #333;
    }

    .tile.suit-wan { color: #c41e3a; }
    .tile.suit-feng { color: #1a3a8a; }

    /* Match path canvas */
    #path-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* ========== Menu & Level Select ========== */

    .level-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .level-btn {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      border: 2px solid #e8b84b;
      background: transparent;
      color: #e8b84b;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .level-btn.locked {
      border-color: #666;
      color: #666;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .level-btn:not(.locked):active {
      background: #e8b84b;
      color: #1a5c2a;
    }

    /* ========== Responsive ========== */

    @media (orientation: landscape) and (max-height: 500px) {
      #btn-bar { padding: 4px 8px; gap: 4px; }
      #btn-bar button { padding: 6px 8px; font-size: 12px; }
      #top-bar { padding: 2px 16px; font-size: 14px; }
      #status-bar { padding: 2px 16px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Menu Screen -->
    <div id="menu-screen" class="screen">
      <h1>🀄 麻将连连看</h1>
      <button id="btn-start">开始游戏</button>
      <div id="level-select"></div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen" style="display:none">
      <div id="top-bar">
        <span id="level-label">关卡 1</span>
        <span id="timer">00:00</span>
      </div>
      <div id="status-bar">
        <span id="score-label">分数: 0</span>
        <span id="combo-label">连击: 0</span>
      </div>
      <div id="board-container">
        <div id="board"></div>
        <canvas id="path-canvas"></canvas>
      </div>
      <div id="btn-bar">
        <button id="btn-hint">提示 <span class="count" id="hints-count">(3)</span></button>
        <button id="btn-shuffle">洗牌 <span class="count" id="shuffles-count">(3)</span></button>
        <button id="btn-pause">暂停</button>
        <button id="btn-restart">重来</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
      <div class="result-title" id="result-title">恭喜过关!</div>
      <div class="result-score" id="result-score">得分: 0</div>
      <div class="result-buttons">
        <button id="btn-next">下一关</button>
        <button id="btn-retry">重试</button>
        <button id="btn-menu">返回菜单</button>
      </div>
    </div>
  </div>

  <!-- Pause Overlay -->
  <div id="pause-overlay">
    <div class="pause-message">游戏暂停</div>
    <button id="btn-resume">继续</button>
  </div>

  <script>
    // ========== 牌面定义 ==========

    // 筒 (Dots): CSS-drawn dot patterns
    const TONG = [
      { id: 'tong1', suit: 'tong', name: '一筒', value: 1, display: 'dot-1' },
      { id: 'tong2', suit: 'tong', name: '二筒', value: 2, display: 'dot-2' },
      { id: 'tong3', suit: 'tong', name: '三筒', value: 3, display: 'dot-3' },
      { id: 'tong4', suit: 'tong', name: '四筒', value: 4, display: 'dot-4' },
      { id: 'tong5', suit: 'tong', name: '五筒', value: 5, display: 'dot-5' },
      { id: 'tong6', suit: 'tong', name: '六筒', value: 6, display: 'dot-6' },
      { id: 'tong7', suit: 'tong', name: '七筒', value: 7, display: 'dot-7' },
      { id: 'tong8', suit: 'tong', name: '八筒', value: 8, display: 'dot-8' },
      { id: 'tong9', suit: 'tong', name: '九筒', value: 9, display: 'dot-9' },
    ];

    // 条 (Bamboo): CSS-drawn vertical lines
    const TIAO = [
      { id: 'tiao1', suit: 'tiao', name: '一条', value: 1, display: 'line-1' },
      { id: 'tiao2', suit: 'tiao', name: '二条', value: 2, display: 'line-2' },
      { id: 'tiao3', suit: 'tiao', name: '三条', value: 3, display: 'line-3' },
      { id: 'tiao4', suit: 'tiao', name: '四条', value: 4, display: 'line-4' },
      { id: 'tiao5', suit: 'tiao', name: '五条', value: 5, display: 'line-5' },
      { id: 'tiao6', suit: 'tiao', name: '六条', value: 6, display: 'line-6' },
      { id: 'tiao7', suit: 'tiao', name: '七条', value: 7, display: 'line-7' },
      { id: 'tiao8', suit: 'tiao', name: '八条', value: 8, display: 'line-8' },
      { id: 'tiao9', suit: 'tiao', name: '九条', value: 9, display: 'line-9' },
    ];

    // 万 (Characters): Chinese characters
    const WAN = [
      { id: 'wan1', suit: 'wan', name: '一万', value: 1, display: '一万' },
      { id: 'wan2', suit: 'wan', name: '二万', value: 2, display: '二万' },
      { id: 'wan3', suit: 'wan', name: '三万', value: 3, display: '三万' },
      { id: 'wan4', suit: 'wan', name: '四万', value: 4, display: '四万' },
      { id: 'wan5', suit: 'wan', name: '五万', value: 5, display: '五万' },
      { id: 'wan6', suit: 'wan', name: '六万', value: 6, display: '六万' },
      { id: 'wan7', suit: 'wan', name: '七万', value: 7, display: '七万' },
      { id: 'wan8', suit: 'wan', name: '八万', value: 8, display: '八万' },
      { id: 'wan9', suit: 'wan', name: '九万', value: 9, display: '九万' },
    ];

    // 风 (Winds)
    const FENG = [
      { id: 'dong', suit: 'feng', name: '东', value: 1, display: '东' },
      { id: 'nan',  suit: 'feng', name: '南', value: 2, display: '南' },
      { id: 'xi',   suit: 'feng', name: '西', value: 3, display: '西' },
      { id: 'bei',  suit: 'feng', name: '北', value: 4, display: '北' },
    ];

    // 箭 (Dragons)
    const JIAN = [
      { id: 'zhong', suit: 'jian', name: '中', value: 1, display: '中' },
      { id: 'fa',    suit: 'jian', name: '发', value: 2, display: '发' },
      { id: 'bai',   suit: 'jian', name: '白', value: 3, display: '白' },
    ];

    const ALL_TILES = [...TONG, ...TIAO, ...WAN, ...FENG, ...JIAN];

    // ========== 关卡定义 ==========

    const LEVELS = [
      {
        id: 1, rows: 4, cols: 4, tileCount: 16,
        suits: ['tong'], types: 4, time: Infinity,
        hints: 3, shuffles: 1,
      },
      {
        id: 2, rows: 4, cols: 6, tileCount: 24,
        suits: ['tong', 'tiao'], types: 6, time: 180,
        hints: 3, shuffles: 1,
      },
      {
        id: 3, rows: 6, cols: 6, tileCount: 36,
        suits: ['tong', 'tiao', 'wan'], types: 9, time: 150,
        hints: 2, shuffles: 1,
      },
      {
        id: 4, rows: 6, cols: 8, tileCount: 48,
        suits: ['tong', 'tiao', 'wan', 'feng'], types: 12, time: 150,
        hints: 2, shuffles: 1,
      },
      {
        id: 5, rows: 8, cols: 8, tileCount: 64,
        suits: ['tong', 'tiao', 'wan', 'feng', 'jian'], types: 16, time: 120,
        hints: 2, shuffles: 1,
      },
      {
        id: 6, rows: 8, cols: 10, tileCount: 80,
        suits: ['tong', 'tiao', 'wan', 'feng', 'jian'], types: 20, time: 120,
        hints: 1, shuffles: 1,
      },
      {
        id: 7, rows: 10, cols: 10, tileCount: 100,
        suits: ['tong', 'tiao', 'wan', 'feng', 'jian'], types: 25, time: 100,
        hints: 1, shuffles: 1,
      },
      {
        id: 8, rows: 10, cols: 12, tileCount: 120,
        suits: ['tong', 'tiao', 'wan', 'feng', 'jian'], types: 30, time: 90,
        hints: 1, shuffles: 0,
      },
      {
        id: 9, rows: 12, cols: 12, tileCount: 144,
        suits: ['tong', 'tiao', 'wan', 'feng', 'jian'], types: 34, time: 80,
        hints: 1, shuffles: 0,
      },
      {
        id: 10, rows: 12, cols: 12, tileCount: 144,
        suits: ['tong', 'tiao', 'wan', 'feng', 'jian'], types: 34, time: 60,
        hints: 0, shuffles: 0,
      },
    ];

    // ========== 路径查找 (BFS, 最多拐2次弯) ==========

    /**
     * Check if a cell is passable (empty or out of bounds - path can go outside board)
     */
    function isPassable(board, r, c, rows, cols) {
      // Out of bounds is passable (path can go outside)
      if (r < 0 || r >= rows || c < 0 || c >= cols) return true;
      // In bounds: must be empty (null)
      return board[r][c] === null;
    }

    /**
     * Find a valid path between two positions on the board.
     * Returns array of {r, c} waypoints if found, null otherwise.
     * Path can have at most 2 turns (3 straight segments).
     */
    function findPath(board, r1, c1, r2, c2) {
      const rows = board.length;
      const cols = board[0].length;

      // Same position is invalid
      if (r1 === r2 && c1 === c2) return null;

      // BFS state: {r, c, dir, turns, path}
      const DIRS = [
        [-1, 0, 'up'],
        [1, 0, 'down'],
        [0, -1, 'left'],
        [0, 1, 'right'],
      ];

      const queue = [];
      const visited = new Map(); // key: "r,c,dir,turns" -> true

      // Initialize from start in all 4 directions
      for (const [dr, dc, dir] of DIRS) {
        const nr = r1 + dr;
        const nc = c1 + dc;
        // The next cell must be passable (not the start or end)
        if (nr === r2 && nc === c2) {
          // Direct neighbor
          return [{ r: r1, c: c1 }, { r: r2, c: c2 }];
        }
        if (isPassable(board, nr, nc, rows, cols)) {
          const key = `${nr},${nc},${dir},0`;
          if (!visited.has(key)) {
            visited.set(key, true);
            queue.push({ r: nr, c: nc, dir, turns: 0, path: [{ r: r1, c: c1 }, { r: nr, c: nc }] });
          }
        }
      }

      while (queue.length > 0) {
        const { r, c, dir, turns, path } = queue.shift();

        for (const [dr, dc, newDir] of DIRS) {
          const nr = r + dr;
          const nc = c + dc;
          const newTurns = (newDir === dir) ? turns : turns + 1;

          // Can't exceed 2 turns
          if (newTurns > 2) continue;

          // Reached the target?
          if (nr === r2 && nc === c2) {
            return [...path, { r: nr, c: nc }];
          }

          // Must be passable
          if (!isPassable(board, nr, nc, rows, cols)) continue;

          const key = `${nr},${nc},${newDir},${newTurns}`;
          if (!visited.has(key)) {
            visited.set(key, true);
            queue.push({
              r: nr, c: nc, dir: newDir, turns: newTurns,
              path: [...path, { r: nr, c: nc }],
            });
          }
        }
      }

      return null; // No path found
    }

    // ========== 棋盘生成 ==========

    /**
     * Get available tile types for a level
     */
    function getAvailableTiles(level) {
      // Collect parallel arrays of tiles per suit
      const suitTileArrays = level.suits.map(suit =>
        ALL_TILES.filter(t => t.suit === suit)
      );

      // Round-robin interleave to distribute evenly across suits
      const tiles = [];
      let idx = 0;
      while (tiles.length < level.types) {
        let added = false;
        for (const arr of suitTileArrays) {
          if (idx < arr.length && tiles.length < level.types) {
            tiles.push(arr[idx]);
            added = true;
          }
        }
        if (!added) break; // no more tiles available
        idx++;
      }
      return tiles;
    }

    /**
     * Shuffle array in-place (Fisher-Yates)
     */
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    /**
     * Generate a board for the given level.
     * Each tile type appears in pairs.
     * Returns 2D array where each cell is tileObject or null.
     */
    function generateBoard(level) {
      const { rows, cols, tileCount } = level;
      const available = getAvailableTiles(level);

      // Guard: need at least one tile type
      if (available.length === 0) {
        console.error('No available tile types for level', level.id);
        return Array.from({ length: rows }, () => Array(cols).fill(null));
      }

      // Guard: tileCount must be even for pairing
      if (tileCount % 2 !== 0) {
        console.error('tileCount must be even, got', tileCount);
        return Array.from({ length: rows }, () => Array(cols).fill(null));
      }

      const board = Array.from({ length: rows }, () => Array(cols).fill(null));

      // Create pairs: we need tileCount/2 pairs
      const pairCount = tileCount / 2;
      const tilePool = [];

      for (let i = 0; i < pairCount; i++) {
        // Pick a tile type (cycle through available if more pairs than types)
        const tile = { ...available[i % available.length] };
        tilePool.push(tile, { ...tile }); // two copies
      }

      shuffle(tilePool);

      // Place tiles in grid positions
      const positions = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          positions.push({ r, c });
        }
      }
      shuffle(positions);

      // Take exactly tileCount positions
      const usedPositions = positions.slice(0, tileCount);
      for (let i = 0; i < tilePool.length; i++) {
        const { r, c } = usedPositions[i];
        board[r][c] = { ...tilePool[i], removed: false };
      }

      return board;
    }

    /**
     * Check if there's at least one valid match on the board
     */
    function hasValidMove(board) {
      const rows = board.length;
      const cols = board[0].length;

      // Collect all non-null positions grouped by tile id
      const byId = new Map();
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (board[r][c] !== null) {
            const key = board[r][c].id;
            if (!byId.has(key)) byId.set(key, []);
            byId.get(key).push({ r, c });
          }
        }
      }

      // Check each pair of same-type tiles
      for (const positions of byId.values()) {
        for (let i = 0; i < positions.length; i++) {
          for (let j = i + 1; j < positions.length; j++) {
            if (findPath(board, positions[i].r, positions[i].c, positions[j].r, positions[j].c)) {
              return true;
            }
          }
        }
      }
      return false;
    }

    const MAX_GENERATION_ATTEMPTS = 100;

    /**
     * Generate a board that is guaranteed to have at least one valid move
     */
    function generateSolvableBoard(level) {
      let board;
      let attempts = 0;
      do {
        board = generateBoard(level);
        attempts++;
        if (attempts >= MAX_GENERATION_ATTEMPTS) {
          // Fallback: just return whatever we have
          console.warn('Could not generate solvable board after', MAX_GENERATION_ATTEMPTS, 'attempts');
          break;
        }
      } while (!hasValidMove(board));
      return board;
    }

    // ========== 游戏状态管理 ==========

    const GameState = {
      level: 1,
      board: [],
      selected: null,      // {r, c} | null
      score: 0,
      combo: 0,
      timeLeft: 0,
      timerInterval: null,
      hintsLeft: 3,
      shufflesLeft: 1,
      isPaused: false,
      isOver: false,
      totalPairs: 0,
      matchedPairs: 0,
    };

    function initGameState(levelId) {
      const level = LEVELS.find(l => l.id === levelId);
      if (!level) return;

      GameState.level = levelId;
      GameState.board = generateSolvableBoard(level);
      GameState.selected = null;
      GameState.score = 0;
      GameState.combo = 0;
      GameState.timeLeft = level.time === Infinity ? -1 : level.time;
      GameState.hintsLeft = level.hints;
      GameState.shufflesLeft = level.shuffles;
      GameState.isPaused = false;
      GameState.isOver = false;

      // Count actual pairs on board
      let count = 0;
      for (const row of GameState.board) {
        for (const cell of row) {
          if (cell !== null) count++;
        }
      }
      GameState.totalPairs = Math.floor(count / 2);
      GameState.matchedPairs = 0;

      if (GameState.timerInterval) clearInterval(GameState.timerInterval);
      if (GameState.timeLeft > 0) {
        GameState.timerInterval = setInterval(tickTimer, 1000);
      }
    }

    function tickTimer() {
      if (GameState.isPaused || GameState.isOver) return;
      GameState.timeLeft--;
      updateTimerDisplay();
      if (GameState.timeLeft <= 0) {
        gameOver(false);
      }
    }

    function gameOver(won) {
      GameState.isOver = true;
      if (GameState.timerInterval) clearInterval(GameState.timerInterval);
      showResult(won);
    }

    function removePair(r1, c1, r2, c2) {
      GameState.board[r1][c1] = null;
      GameState.board[r2][c2] = null;
      GameState.matchedPairs++;
      GameState.combo++;
      GameState.score += 100 * GameState.combo;

      updateBoardDisplay();
      updateStatusDisplay();

      // Check win
      if (GameState.matchedPairs >= GameState.totalPairs) {
        // Add time bonus
        if (GameState.timeLeft > 0) {
          GameState.score += GameState.timeLeft * 5;
        }
        gameOver(true);
        return;
      }

      // Check if any moves remain
      if (!hasValidMove(GameState.board)) {
        if (GameState.shufflesLeft > 0) {
          doShuffle();
        } else {
          gameOver(false);
        }
      }
    }

    function selectTile(r, c) {
      if (GameState.isPaused || GameState.isOver) return;
      if (GameState.board[r][c] === null) return;

      if (GameState.selected === null) {
        // First selection
        GameState.selected = { r, c };
        highlightTile(r, c, true);
      } else if (GameState.selected.r === r && GameState.selected.c === c) {
        // Deselect
        highlightTile(GameState.selected.r, GameState.selected.c, false);
        GameState.selected = null;
      } else if (GameState.board[r][c].id === GameState.board[GameState.selected.r][GameState.selected.c].id) {
        // Same type — try to match
        const path = findPath(
          GameState.board,
          GameState.selected.r, GameState.selected.c,
          r, c
        );
        if (path) {
          // Valid match!
          highlightTile(GameState.selected.r, GameState.selected.c, false);
          animateMatch(GameState.selected.r, GameState.selected.c, r, c, path);
          const sr = GameState.selected.r, sc = GameState.selected.c;
          GameState.selected = null;
          removePair(sr, sc, r, c);
        } else {
          // Can't connect — switch selection
          highlightTile(GameState.selected.r, GameState.selected.c, false);
          GameState.selected = { r, c };
          highlightTile(r, c, true);
          GameState.combo = 0;
        }
      } else {
        // Different type — switch selection
        highlightTile(GameState.selected.r, GameState.selected.c, false);
        GameState.selected = { r, c };
        highlightTile(r, c, true);
        GameState.combo = 0;
      }
    }

    // ========== 棋盘渲染 ==========

    const boardEl = document.getElementById('board');

    function renderBoard() {
      const { board } = GameState;
      const rows = board.length;
      const cols = board[0].length;

      boardEl.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
      boardEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      boardEl.style.display = 'grid';
      boardEl.style.gap = '2px';
      boardEl.innerHTML = '';

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const tile = board[r][c];
          const cellEl = document.createElement('div');
          cellEl.className = 'tile';
          cellEl.dataset.r = r;
          cellEl.dataset.c = c;

          if (tile !== null) {
            if (tile.suit === 'tong') {
              cellEl.classList.add(`dots-${tile.value}`);
              cellEl.innerHTML = renderDotPattern(tile.value);
            } else if (tile.suit === 'tiao') {
              cellEl.innerHTML = renderLinePattern(tile.value);
            } else {
              // 万, 风, 箭 — display Chinese characters
              cellEl.classList.add('char-tile');
              cellEl.classList.add(`suit-${tile.suit}`);
              cellEl.textContent = tile.display;
            }

            cellEl.addEventListener('click', () => selectTile(r, c));
          } else {
            cellEl.classList.add('empty');
          }

          boardEl.appendChild(cellEl);
        }
      }

      resizeBoard();
    }

    function renderDotPattern(count) {
      let dots = '';
      for (let i = 0; i < count; i++) {
        dots += '<div class="dot"></div>';
      }
      return `<div class="dot-container">${dots}</div>`;
    }

    function renderLinePattern(count) {
      let lines = '';
      for (let i = 0; i < count; i++) {
        lines += '<div class="bamboo-line"></div>';
      }
      return `<div class="line-container">${lines}</div>`;
    }

    function updateBoardDisplay() {
      const cells = boardEl.querySelectorAll('.tile');
      cells.forEach(cell => {
        const r = parseInt(cell.dataset.r);
        const c = parseInt(cell.dataset.c);
        if (GameState.board[r][c] === null) {
          cell.innerHTML = '';
          cell.className = 'tile empty';
        }
      });
    }

    function highlightTile(r, c, on) {
      const cell = boardEl.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
      if (cell) cell.classList.toggle('selected', on);
    }

    function resizeBoard() {
      const container = document.getElementById('board-container');
      const maxWidth = container.clientWidth - 16;
      const maxHeight = container.clientHeight - 16;
      const rows = GameState.board.length;
      if (rows === 0) return;
      const cols = GameState.board[0].length;
      if (cols === 0) return;

      const gapSize = 2;
      const fromWidth = (maxWidth - (cols - 1) * gapSize) / cols;
      const fromHeight = (maxHeight - (rows - 1) * gapSize) / rows;
      const tileSize = Math.floor(Math.min(fromWidth, fromHeight));

      boardEl.style.gridTemplateRows = `repeat(${rows}, ${tileSize}px)`;
      boardEl.style.gridTemplateColumns = `repeat(${cols}, ${tileSize}px)`;
      boardEl.style.width = 'auto';
      boardEl.style.height = 'auto';
    }

    window.addEventListener('resize', resizeBoard);

    // ========== 消除动画 & 连线 ==========

    const pathCanvas = document.getElementById('path-canvas');
    const pathCtx = pathCanvas.getContext('2d');

    function animateMatch(r1, c1, r2, c2, pathPoints) {
      // Draw connection line
      drawConnectionPath(pathPoints);

      // Animate tile removal
      const cell1 = boardEl.querySelector(`.tile[data-r="${r1}"][data-c="${c1}"]`);
      const cell2 = boardEl.querySelector(`.tile[data-r="${r2}"][data-c="${c2}"]`);

      if (cell1) cell1.classList.add('removing');
      if (cell2) cell2.classList.add('removing');
    }

    function drawConnectionPath(points) {
      const container = document.getElementById('board-container');
      pathCanvas.width = container.offsetWidth;
      pathCanvas.height = container.offsetHeight;

      const boardRect = boardEl.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();

      const offsetX = boardRect.left - containerRect.left;
      const offsetY = boardRect.top - containerRect.top;

      const rows = GameState.board.length;
      const cols = GameState.board[0].length;
      const cellW = boardEl.offsetWidth / cols;
      const cellH = boardEl.offsetHeight / rows;

      pathCtx.clearRect(0, 0, pathCanvas.width, pathCanvas.height);

      pathCtx.strokeStyle = '#ff4444';
      pathCtx.lineWidth = 4;
      pathCtx.lineCap = 'round';
      pathCtx.lineJoin = 'round';

      pathCtx.beginPath();
      for (let i = 0; i < points.length; i++) {
        const px = offsetX + points[i].c * cellW + cellW / 2;
        const py = offsetY + points[i].r * cellH + cellH / 2;
        if (i === 0) pathCtx.moveTo(px, py);
        else pathCtx.lineTo(px, py);
      }
      pathCtx.stroke();

      // Clear after 300ms
      setTimeout(() => {
        pathCtx.clearRect(0, 0, pathCanvas.width, pathCanvas.height);
      }, 300);
    }

    // ========== 提示 & 洗牌 ==========

    function findHintPair() {
      const { board } = GameState;
      const rows = board.length;
      const cols = board[0].length;
      const byId = new Map();

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (board[r][c] !== null) {
            const key = board[r][c].id;
            if (!byId.has(key)) byId.set(key, []);
            byId.get(key).push({ r, c });
          }
        }
      }

      for (const positions of byId.values()) {
        for (let i = 0; i < positions.length; i++) {
          for (let j = i + 1; j < positions.length; j++) {
            if (findPath(board, positions[i].r, positions[i].c, positions[j].r, positions[j].c)) {
              return { pos1: positions[i], pos2: positions[j] };
            }
          }
        }
      }
      return null;
    }

    function useHint() {
      if (GameState.isPaused || GameState.isOver) return;
      if (GameState.hintsLeft <= 0) return;

      const pair = findHintPair();
      if (!pair) return;

      GameState.hintsLeft--;
      GameState.score = Math.max(0, GameState.score - 30);
      document.getElementById('hints-count').textContent = GameState.hintsLeft;
      updateStatusDisplay();

      const cell1 = boardEl.querySelector(`.tile[data-r="${pair.pos1.r}"][data-c="${pair.pos1.c}"]`);
      const cell2 = boardEl.querySelector(`.tile[data-r="${pair.pos2.r}"][data-c="${pair.pos2.c}"]`);

      if (cell1) cell1.classList.add('hint-glow');
      if (cell2) cell2.classList.add('hint-glow');

      setTimeout(() => {
        if (cell1) cell1.classList.remove('hint-glow');
        if (cell2) cell2.classList.remove('hint-glow');
      }, 2000);
    }

    function doShuffle() {
      if (GameState.shufflesLeft <= 0) return;

      GameState.shufflesLeft--;
      document.getElementById('shuffles-count').textContent = GameState.shufflesLeft;

      // Collect remaining tiles
      const tiles = [];
      for (let r = 0; r < GameState.board.length; r++) {
        for (let c = 0; c < GameState.board[0].length; c++) {
          if (GameState.board[r][c] !== null) {
            tiles.push(GameState.board[r][c]);
          }
        }
      }

      shuffle(tiles);

      // Re-place tiles
      let idx = 0;
      for (let r = 0; r < GameState.board.length; r++) {
        for (let c = 0; c < GameState.board[0].length; c++) {
          if (GameState.board[r][c] !== null) {
            GameState.board[r][c] = { ...tiles[idx++] };
          }
        }
      }

      // Clear selection
      if (GameState.selected) {
        highlightTile(GameState.selected.r, GameState.selected.c, false);
        GameState.selected = null;
      }

      // Re-render
      renderBoard();

      // Ensure solvability
      if (!hasValidMove(GameState.board)) {
        const level = LEVELS.find(l => l.id === GameState.level);
        GameState.board = generateSolvableBoard(level);
        renderBoard();
      }
    }

    // ========== 界面切换 & 按钮处理 ==========

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
      const screen = document.getElementById(screenId);
      if (screen) screen.style.display = 'flex';
    }

    function showMenu() {
      if (GameState.timerInterval) clearInterval(GameState.timerInterval);
      GameState.isOver = true;
      showScreen('menu-screen');
      renderLevelSelect();
    }

    function startLevel(levelId) {
      initGameState(levelId);
      renderBoard();
      updateStatusDisplay();
      updateTimerDisplay();
      document.getElementById('level-label').textContent = `第 ${levelId} 关`;
      document.getElementById('hints-count').textContent = GameState.hintsLeft;
      document.getElementById('shuffles-count').textContent = GameState.shufflesLeft;
      showScreen('game-screen');
    }

    function showResult(won) {
      showScreen('result-screen');
      const titleEl = document.getElementById('result-title');
      const scoreEl = document.getElementById('result-score');
      const btnNext = document.getElementById('btn-next');

      if (won) {
        titleEl.textContent = '🎉 恭喜过关！';
        scoreEl.textContent = `得分: ${GameState.score}`;

        const unlocked = getUnlockedLevel();
        if (GameState.level >= unlocked) {
          setUnlockedLevel(GameState.level + 1);
        }

        const nextLevel = LEVELS.find(l => l.id === GameState.level + 1);
        btnNext.style.display = nextLevel ? 'inline-block' : 'none';
        if (!nextLevel) titleEl.textContent = '🏆 全部通关！';
      } else {
        if (GameState.timeLeft <= 0) {
          titleEl.textContent = '⏰ 时间耗尽！';
        } else {
          titleEl.textContent = '😞 无路可走！';
        }
        scoreEl.textContent = `得分: ${GameState.score}`;
        btnNext.style.display = 'none';
      }
    }

    function updateStatusDisplay() {
      document.getElementById('score-label').textContent = `分数: ${GameState.score}`;
      const comboEl = document.getElementById('combo-label');
      comboEl.textContent = GameState.combo > 1 ? `🔥 连击 x${GameState.combo}` : '';
    }

    function updateTimerDisplay() {
      const timerEl = document.getElementById('timer');
      if (GameState.timeLeft < 0) {
        timerEl.textContent = '⏱ --:--';
      } else {
        const m = Math.floor(GameState.timeLeft / 60);
        const s = GameState.timeLeft % 60;
        timerEl.textContent = `⏱ ${m}:${String(s).padStart(2, '0')}`;
      }
    }

    function pauseGame() {
      GameState.isPaused = true;
      document.getElementById('pause-overlay').style.display = 'flex';
    }

    function resumeGame() {
      GameState.isPaused = false;
      document.getElementById('pause-overlay').style.display = 'none';
    }

    function restartLevel() {
      resumeGame();
      startLevel(GameState.level);
    }

    // ========== localStorage 持久化 ==========

    function getUnlockedLevel() {
      try {
        return parseInt(localStorage.getItem('mahjong_unlocked')) || 1;
      } catch { return 1; }
    }

    function setUnlockedLevel(level) {
      try {
        localStorage.setItem('mahjong_unlocked', level);
      } catch { /* ignore */ }
    }

    // ========== 主菜单关卡选择 ==========

    function renderLevelSelect() {
      const container = document.getElementById('level-select');
      const unlocked = getUnlockedLevel();
      let html = '<div class="level-grid">';

      for (const level of LEVELS) {
        const locked = level.id > unlocked;
        html += `<button class="level-btn${locked ? ' locked' : ''}"
          data-level="${level.id}"${locked ? ' disabled' : ''}>
          ${locked ? '🔒' : level.id}
        </button>`;
      }
      html += '</div>';
      container.innerHTML = html;

      container.querySelectorAll('.level-btn:not(.locked)').forEach(btn => {
        btn.addEventListener('click', () => startLevel(parseInt(btn.dataset.level)));
      });
    }

    // ========== 初始化事件绑定 ==========

    function init() {
      document.getElementById('btn-start').addEventListener('click', () => {
        startLevel(1);
      });

      document.getElementById('btn-hint').addEventListener('click', useHint);
      document.getElementById('btn-shuffle').addEventListener('click', doShuffle);
      document.getElementById('btn-pause').addEventListener('click', pauseGame);
      document.getElementById('btn-restart').addEventListener('click', restartLevel);
      document.getElementById('btn-resume').addEventListener('click', resumeGame);
      document.getElementById('btn-next').addEventListener('click', () => {
        startLevel(GameState.level + 1);
      });
      document.getElementById('btn-retry').addEventListener('click', () => {
        startLevel(GameState.level);
      });
      document.getElementById('btn-menu').addEventListener('click', showMenu);

      // Prevent context menu on long press
      document.addEventListener('contextmenu', e => e.preventDefault());

      // Prevent double-tap zoom on board
      document.getElementById('board').addEventListener('touchstart', e => {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });

      renderLevelSelect();
      showScreen('menu-screen');
    }

    // Start the app when DOM is ready
    document.addEventListener('DOMContentLoaded', init);

  </script>
</body>
</html>
