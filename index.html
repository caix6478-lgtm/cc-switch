<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>麻将连连看</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    body {
      background: #1a5c2a;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- Menu Screen ---------- */
    #menu-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 24px;
      padding: 20px;
    }

    #menu-screen h1 {
      color: #ffd700;
      font-size: 28px;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    #btn-start {
      padding: 14px 48px;
      font-size: 20px;
      border: none;
      border-radius: 8px;
      background: #e6b422;
      color: #1a5c2a;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    #btn-start:active {
      transform: scale(0.96);
    }

    #level-select {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ---------- Game Screen ---------- */
    #game-screen {
      display: none;
      flex-direction: column;
      height: 100%;
      padding: 8px;
    }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 8px;
      color: #ffd700;
      font-size: 16px;
      font-weight: bold;
    }

    #status-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 4px 8px;
      color: #fff;
      font-size: 14px;
    }

    #board-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #board {
      position: relative;
    }

    #btn-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 4px;
    }

    #btn-bar button {
      padding: 8px 12px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #e6b422;
      color: #1a5c2a;
      font-weight: bold;
      cursor: pointer;
    }

    #btn-bar button:active {
      transform: scale(0.94);
    }

    #btn-bar button .count {
      font-size: 11px;
      color: #333;
    }

    /* ---------- Result Screen ---------- */
    #result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      padding: 20px;
    }

    #result-screen .result-title {
      color: #ffd700;
      font-size: 26px;
      font-weight: bold;
      text-align: center;
    }

    #result-screen .result-score {
      color: #fff;
      font-size: 20px;
    }

    #result-screen .result-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #result-screen .result-buttons button {
      padding: 12px 28px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #e6b422;
      color: #1a5c2a;
      font-weight: bold;
      cursor: pointer;
    }

    #result-screen .result-buttons button:active {
      transform: scale(0.96);
    }

    /* ---------- Pause Overlay ---------- */
    #pause-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #pause-overlay .pause-message {
      color: #ffd700;
      font-size: 28px;
      font-weight: bold;
    }

    #pause-overlay #btn-resume {
      padding: 14px 48px;
      font-size: 20px;
      border: none;
      border-radius: 8px;
      background: #e6b422;
      color: #1a5c2a;
      font-weight: bold;
      cursor: pointer;
    }

    #pause-overlay #btn-resume:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Menu Screen -->
    <div id="menu-screen">
      <h1>🀄 麻将连连看</h1>
      <button id="btn-start">开始游戏</button>
      <div id="level-select"></div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen">
      <div id="top-bar">
        <span id="level-label">关卡 1</span>
        <span id="timer">00:00</span>
      </div>
      <div id="status-bar">
        <span id="score">分数: 0</span>
        <span id="combo">连击: 0</span>
      </div>
      <div id="board-container">
        <div id="board"></div>
      </div>
      <div id="btn-bar">
        <button id="btn-hint">提示 <span class="count" id="hint-count">(3)</span></button>
        <button id="btn-shuffle">洗牌 <span class="count" id="shuffle-count">(3)</span></button>
        <button id="btn-pause">暂停</button>
        <button id="btn-restart">重来</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen">
      <div class="result-title" id="result-title">恭喜过关!</div>
      <div class="result-score" id="result-score">得分: 0</div>
      <div class="result-buttons">
        <button id="btn-next">下一关</button>
        <button id="btn-retry">重试</button>
        <button id="btn-menu">返回菜单</button>
      </div>
    </div>
  </div>

  <!-- Pause Overlay -->
  <div id="pause-overlay">
    <div class="pause-message">游戏暂停</div>
    <button id="btn-resume">继续</button>
  </div>

  <script>
    // JavaScript logic will be added in subsequent tasks
  </script>
</body>
</html>
